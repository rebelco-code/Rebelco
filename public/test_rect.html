<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: #111;
            color: white;
            display: flex;
            gap: 2rem;
            padding: 2rem;
        }

        .card-img-wrap {
            width: 400px;
            height: 400px;
            /* Square */
            overflow: hidden;
            position: relative;
            border: 2px solid #333;
        }

        .label-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
            transform: scale(2.2);
            /* Zoom enough to crop out side labels */
        }

        .card-img-wrap-2 {
            width: 400px;
            height: 400px;
            overflow: hidden;
            position: relative;
            border: 2px solid #333;
        }

        .label-photo-2 {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
            transform: scale(3.0);
        }
    </style>
</head>

<body>

    <div class="card-img-wrap">
        <img src="/canva_slide_1.png" class="label-photo" />
    </div>
    <div class="card-img-wrap-2">
        <img src="/canva_slide_2.png" class="label-photo-2" />
    </div>

</body>

</html>
